# Model arguments
model_name_or_path: Qwen/Qwen3-4B
model_revision: main
torch_dtype: bfloat16
lora_r: 32
# Data training arguments
dataset_instruct_folder: logs-trained/dataset_instruct
use_mixed_objective: true
# GRPO trainer config
bf16: true
use_vllm: true
do_eval: true
gradient_accumulation_steps: 4
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
learning_rate: 2.0e-5
log_completions: true
log_level: info
logging_first_step: true
logging_steps: 1
logging_strategy: steps
max_prompt_length: 5200
max_completion_length: 2048
max_steps: 1
num_generations: 4
num_train_epochs: 1
output_dir: example_trajectory/training
overwrite_output_dir: true
per_device_eval_batch_size: 4
per_device_train_batch_size: 4
push_to_hub: false
report_to:
- wandb
reward_funcs:
- mixed_objective_reward_function
save_strategy: "steps"
save_steps: 40
save_total_limit: 31
seed: 42
warmup_ratio: 0.1
eval_strategy: "steps"
eval_steps: 40
temperature: 1.0
weight_decay: 0.001
lr_scheduler_type: "linear"
optim: "adamw_8bit"
eval_on_start: true
